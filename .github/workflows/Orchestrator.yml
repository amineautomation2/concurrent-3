name: Orchestrator
on:
  workflow_dispatch:
  schedule:
    - cron: "38 13 1 */3 *"

env:
  IDLE_TIME: 120

jobs:
  run-urls-workflow:
    uses: ./.github/workflows/URLs.yml

  wait-after-urls:
    needs: run-urls-workflow
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: sleep ${{ env.IDLE_TIME }}

  run-mf-workflow:
    needs: wait-after-urls
    uses: ./.github/workflows/MF.yml
  
  run-email-workflow:
    needs: run-mf-workflow
    uses: ./.github/workflows/Email.yml
